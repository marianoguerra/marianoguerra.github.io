# Guy Steele: Growing a Language

???

El objetivo central de Guy Steele en "Growing a Language" es defender que un lenguaje de programación exitoso no debe ser una estructura rígida y terminada, sino un sistema capaz de crecer orgánicamente.

Steele comienza su discurso utilizando exclusivamente palabras de una sola sílaba. A medida que avanza, va "definiendo" términos más complejos y largos utilizando únicamente el vocabulario monosilábico previo; solo después de explicar un concepto (como computer o language), se permite incorporarlo a su léxico. Esta técnica demuestra visual y auditivamente cómo se puede construir un sistema complejo y expresivo a partir de componentes básicos muy simples.

- 2019: WebAssembly 1.0 (MVP)

- Next: The WebAssembly Working group intends to maintain this publication in the Candidate Recommendation state and continually update it as a "living standard" rather than transition to Recommendation state.

---

Un sistema complejo que funciona invariablemente evolucionó de un sistema simple que funcionaba.

La proposición inversa también parece ser cierta:

Un sistema complejo diseñado desde cero nunca funciona y no se puede lograr que funcione.

Hay que empezar de cero, partiendo de un sistema simple que funcione.

-- Ley de Gall

???

A complex system that works is invariably found to have evolved from a simple system that worked.
The inverse proposition also appears to be true:
A complex system designed from scratch never works and cannot be made to work.
You have to start over, beginning with a working simple system.

-- Gall's law
